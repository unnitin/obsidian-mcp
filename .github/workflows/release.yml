name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ─── Build Python wheel ───────────────────────────────────────────────────
  build-backend:
    name: Build Python wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run tests
        run: uv run pytest packages/backend/tests/ -q

      - name: Build wheel
        run: uv build --package obsidian-search --out-dir dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl

  # ─── Build Obsidian plugin ────────────────────────────────────────────────
  build-plugin:
    name: Build Obsidian plugin
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/obsidian-plugin/package-lock.json

      - name: Install dependencies
        working-directory: packages/obsidian-plugin
        run: npm ci

      - name: Build plugin
        working-directory: packages/obsidian-plugin
        run: npm run build

      - name: Package plugin zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="obsidian-semantic-search-${VERSION}.zip"
          zip -j "$ZIP" \
            packages/obsidian-plugin/main.js \
            packages/obsidian-plugin/manifest.json \
            packages/obsidian-plugin/styles.css
          echo "PLUGIN_ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-plugin
          path: "*.zip"

  # ─── Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-plugin]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets/

      - name: Generate changelog from commits since last tag
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p' || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty="- %s" --no-merges)
          else
            LOG=$(git log --pretty="- %s" --no-merges | head -30)
          fi
          echo "CHANGELOG<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## What's changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Installation

            **Backend** — install the Python wheel:
            ```bash
            pip install obsidian-search-*.whl
            VAULT_PATH=/path/to/vault obsidian-search-api
            ```

            **Obsidian plugin** — unzip `obsidian-semantic-search-*.zip` into your vault's `.obsidian/plugins/` directory.
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
