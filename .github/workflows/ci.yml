name: CI

on:
  push:
    branches: [main]       # post-merge verification only
  pull_request:
    branches: [main]       # pre-merge gate (the one that blocks bad PRs)

# Cancel in-progress runs for the same branch/PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  # Minimum coverage percentage required to pass.
  COVERAGE_THRESHOLD: "80"

jobs:
  # ─── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (frozen)
        run: uv sync --all-extras --frozen

      - name: ruff — lint
        run: uv run ruff check packages/backend/ --output-format=github

      - name: ruff — format check
        run: uv run ruff format --check packages/backend/

  # ─── Type check ───────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (frozen)
        run: uv sync --all-extras --frozen

      - name: mypy
        run: uv run mypy packages/backend/src/

  # ─── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]   # extend to ["3.12", "3.13"] when ready
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (frozen)
        run: uv sync --all-extras --frozen

      - name: Run pytest with coverage
        run: |
          uv run pytest packages/backend/tests/ \
            --cov=packages/backend/src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            -v \
            --tb=short

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ─── Gate ─────────────────────────────────────────────────────────────────
  # This is the single job to add as a required status check in GitHub branch
  # protection settings (Settings → Branches → main → Require status checks →
  # search for "All checks passed").
  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ lint failed"
            exit 1
          fi
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then
            echo "❌ typecheck failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ tests failed"
            exit 1
          fi
          echo "✅ All checks passed"
